<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0a500"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Inner panel -->
  <rect x="60" y="60" width="392" height="392" rx="64" fill="url(#dark)" opacity="0.85"/>
  <!-- Barrel/Kempu body -->
  <rect x="156" y="140" width="200" height="220" rx="28" fill="#f0a500"/>
  <rect x="172" y="156" width="168" height="188" rx="20" fill="#161b22"/>
  <!-- Barrel rings / hoops -->
  <rect x="148" y="180" width="216" height="18" rx="9" fill="#ff6b35"/>
  <rect x="148" y="310" width="216" height="18" rx="9" fill="#ff6b35"/>
  <!-- Label area on barrel -->
  <rect x="185" y="210" width="142" height="80" rx="10" fill="#21262d" stroke="#f0a500" stroke-width="2"/>
  <!-- KL text -->
  <text x="256" y="263" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#f0a500" text-anchor="middle">KL</text>
  <!-- Lid top -->
  <rect x="140" y="128" width="232" height="24" rx="12" fill="#ff6b35"/>
  <!-- Bottom flat -->
  <rect x="140" y="348" width="232" height="24" rx="12" fill="#ff6b35"/>
  <!-- Checkmark overlay bottom right -->
  <circle cx="372" cy="372" r="58" fill="#3fb950"/>
  <polyline points="347,372 365,390 400,354" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
